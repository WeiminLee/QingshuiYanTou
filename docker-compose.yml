version: '3.8'

services:
  neo4j:
    image: swr.cn-north-4.myhuaweicloud.com/ddn-k8s/docker.io/neo4j:latest
    container_name: qingshui_neo4j
    ports:
      - "7474:7474"   # HTTP - Browser UI
      - "7687:7687"   # Bolt - Cypher query protocol
    environment:
      - NEO4J_AUTH=neo4j/qingshui123
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*
      - NEO4J_dbms_memory_heap_initial__size=512m
      - NEO4J_dbms_memory_heap_max__size=2g
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - neo4j_import:/import
    restart: unless-stopped
    networks:
      - qingshui-net

  # PostgreSQL（已有宿主机端口映射，保留在此便于统一管理）
  postgres:
    image: postgres:15
    container_name: qingshui_postgres
    environment:
      - POSTGRES_DB=qingshui
      - POSTGRES_USER=qingshui
      - POSTGRES_PASSWORD=qingshui123
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qingshui"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - qingshui-net

  # MongoDB
  mongo:
    image: mongo:7
    container_name: qingshui_mongo
    ports:
      - "27018:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - qingshui-net

  # Redis
  redis:
    image: redis:7
    container_name: qingshui_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - qingshui-net

  qdrant:
    image: swr.cn-north-4.myhuaweicloud.com/ddn-k8s/docker.io/qdrant/qdrant:latest
    container_name: qingshui_qdrant
    ports:
      - "6333:6333"   # REST API
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped
    networks:
      - qingshui-net

networks:
  qingshui-net:
    driver: bridge

volumes:
  neo4j_data:
  neo4j_logs:
  neo4j_import:
  postgres_data:
  mongo_data:
  redis_data:
  qdrant_data:
